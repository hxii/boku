repos:
  - repo: local
    hooks:
      - id: clean
        name: Clean
        entry: make clean
        language: system
      - id: ruff-lint
        name: Ruff Lint
        entry: uv run ruff check . --fix
        language: system
        types: [python]
      - id: ruff-format
        name: Ruff Format
        entry: uv run ruff format .
        language: system
        types: [python]
