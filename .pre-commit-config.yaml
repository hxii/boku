repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/crate-ci/typos
    rev: v1.31.1
    hooks:
      - id: typos
  - repo: https://github.com/allganize/ty-pre-commit
    rev: v0.0.39
    hooks:
      # Run the type checker.
      - id: ty-check
  - repo: local
    hooks:
      - name: Find FIX Comments
        id: fix_comments
        language: system
        entry: ./hooks/find_fix.sh
        files: \.py$
  - repo: local
    hooks:
      - name: Find TODO Comments
        id: todo_comments
        language: system
        entry: ./hooks/find_todo.sh
        files: \.py$
