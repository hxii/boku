version: 0.1.0 # Boku version
author: Paul Glushak <hxii@0xff.nu> # Author information
description: This is the description of the task file.

variables:
  my_first_var: "A string value"
  my_second_var: 80085
  my_third_var:
    - "list"
    - "of"
    - "items"
  my_secret_var: "A totally secret value"
  environment: "development"
  debug: "true"
  enable_feature: "false"

tasks: # Dict of tasks
  prerequisite_task:
    description: "Dummy task"
    run: "true"
  my_task:
    description: "Optional description of the task"
    run: echo "{}" # The command to run.
    # If `iterate` is used, the iteration will replace `{}` or be appended to the command.
    working_dir: "~"
    save_output: my_task # Variable name to save the output to
    iterate: my_third_var # List of items to iterate over.
    # Str evaluates to a variable.
    depends_on: # List of successful tasks that this task depends on.
      - prerequisite_task
    success_code: 0 # Which return code do we consider successful
    on_success: echo "Done!" # Command to run if successful
    on_failure: echo "Oh no!" # Command to run if failed
  my_final_task:
    depends_on:
      - my_task
    run: |
      echo "${my_task}" | tr -d '\n'
      echo "We can also use multiline commands"
  my_secret_task:
    run: 'echo "We can also hide secret variables with the @ symbol: @{my_secret_var}"'
    suppress_output: true

  # Conditional task examples
  conditional_platform:
    description: "This task only runs on macOS"
    if: '[ "$(uname)" = "Darwin" ]'
    run: echo "Running on macOS!"

  debug_mode_task:
    description: "Only runs when debug is enabled"
    if: '[ "${debug}" = "true" ]'
    run: echo "Debug mode is active"

  production_task:
    description: "Only runs in production environment"
    if: '[ "${environment}" = "production" ]'
    run: echo "Deploying to production..."
    on_success: echo "Production deployment successful!"

  complex_conditional:
    description: "Task with multiple conditions"
    if: |
      [ "${debug}" = "true" ] && [ "${environment}" = "development" ]
    run: echo "Running in development debug mode"

  file_check:
    description: "Only runs if README.md exists"
    if: "test -f README.md"
    run: echo "README.md exists!"

  disabled_feature:
    description: "Example of a disabled feature"
    if: '[ "${enable_feature}" = "true" ]'
    run: echo "This feature is enabled"
