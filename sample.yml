version: 0.0.1
description: Testing task
author: Paul Glushak <paul@glushak.net>

variables:
  greeting: "hello"
tasks:
  hello:
    run: echo "${greeting} World"
    save_output: hello

  loltask:
    run: echo "This would pass"

  again:
    depends_on:
      - hello
    run: echo "${hello} again!"

  edit:
    run: echo "My editor is ${env:EDITOR}"
    on_success: echo "My command was successful!"
